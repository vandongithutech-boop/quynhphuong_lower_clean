{% extends 'base.html' %}

{% block title %}Xóa loại hoa{% endblock %}
{% block page_title %}Xóa loại hoa{% endblock %}

{% block content %}

<div class="card shadow-sm border-0">
    <div class="card-body">
        <h5>Bạn có chắc chắn muốn xóa?</h5>

        <p class="mt-3">
            <strong>{{ flower.code }} - {{ flower.name }}</strong>
        </p>

        <form method="post">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Xác nhận xóa
            </button>

            <a href="{% url 'categories:flower_list' %}"
               class="btn btn-secondary">
                Hủy
            </a>
        </form>
    </div>
</div>

{% endblock %}
