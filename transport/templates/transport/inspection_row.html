<div class="inspection-row">
    <div class="inspection-name">
        <i class="bi {{ icon }}"></i>
        <span>{{ label }}</span>
    </div>

    <label class="ios-switch">
        <input type="checkbox" name="{{ name }}">
        <span></span>
    </label>

    <input type="text"
           name="{{ note }}"
           class="form-control inspection-note"
           placeholder="Ghi chú nếu có vấn đề">
</div>
